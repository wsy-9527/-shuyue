<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makeup Studies 04</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        --scroll-dark: 0;
        margin: 0;
        min-height: 100vh;
        color: #f4f4ef;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      figure {
        margin: 0;
      }

      .background-video {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 28%;
        transform: scale(1.08);
        background: #000;
        pointer-events: none;
      }

      .background-fade {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 50% 18%, rgba(183, 124, 63, 0.12), transparent 34%),
          rgba(0, 0, 0, var(--scroll-dark));
        pointer-events: none;
      }

      .detail-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        padding: 28px clamp(18px, 5vw, 72px) 72px;
        overflow-x: hidden;
      }

      .detail-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .series-id {
        color: rgba(244, 244, 239, 0.62);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .detail-hero {
        width: min(820px, 100%);
        margin: 18vh auto 8vh;
        text-align: center;
      }

      .detail-kicker {
        margin: 0 0 14px;
        color: rgba(244, 244, 239, 0.62);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .detail-title {
        margin: 0;
        font-size: clamp(3.2rem, 10vw, 8rem);
        font-weight: 900;
        line-height: 0.86;
        text-transform: uppercase;
      }

      .detail-copy {
        width: min(560px, 100%);
        margin: 22px auto 0;
        color: rgba(244, 244, 239, 0.72);
        font-size: clamp(0.9rem, 1.6vw, 1.05rem);
        line-height: 1.7;
      }

      .gallery-wrap {
        width: min(1160px, 100%);
        margin: 0 auto;
      }

      .gallery-strip {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
        align-items: flex-start;
      }

      .gallery-strip + .gallery-strip {
        margin-top: 10px;
      }

      .gallery-card {
        aspect-ratio: 3 / 4;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
      }

      .gallery-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery-card.is-contain {
        background: #f4f1ea;
      }

      .gallery-card.is-contain img {
        object-fit: contain;
      }

      @media (max-width: 960px) {
        .detail-hero {
          margin-top: 12vh;
        }

        .gallery-wrap {
          overflow-x: auto;
          padding-bottom: 12px;
        }

        .gallery-strip {
          min-width: 1080px;
        }
      }

      @media (max-width: 720px) {
        .detail-page {
          padding-bottom: 56px;
        }

        .detail-hero {
          text-align: left;
        }

        .detail-copy {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <video class="background-video" src="assets/work-04-bg.mp4" muted loop playsinline autoplay preload="metadata"></video>
    <div class="background-fade" aria-hidden="true"></div>

    <main class="detail-page">
      <nav class="detail-nav" aria-label="作品详情导航">
        <a class="back-link" href="index.html#work">返回作品</a>
        <span class="series-id">Series 04</span>
      </nav>

      <section class="detail-hero" aria-labelledby="detail-title">
        <p class="detail-kicker">Makeup Studies</p>
        <h1 class="detail-title" id="detail-title">Face<br />Light</h1>
        <p class="detail-copy">
          04 系列把妆造、人物和光感放在一起看，主图先做成一张沉浸式横幅，后面再用多张竖图和局部图补足节奏。
        </p>
      </section>

      <section class="gallery-wrap" aria-label="04 系列作品图片">
        <div class="gallery-strip">
          <figure class="gallery-card"><img src="assets/work-04-1.jpg" alt="Void Galaxy 妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-2.jpg" alt="Red Hair and Dusk 妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-4-1.png" alt="Ghotic 妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-5.jpg" alt="星星贴纸妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-6-1.jpg" alt="Pearl Dream 妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-7.jpg" alt="黑白星星妆造作品" /></figure>
          <figure class="gallery-card is-contain"><img src="assets/work-04-8.jpg" alt="三人玫瑰妆造作品" /></figure>
        </div>

        <div class="gallery-strip">
          <figure class="gallery-card"><img src="assets/work-04-9.jpg" alt="黑底圆光妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-10.png" alt="金属红发妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-3.jpg" alt="蓝唇星星妆造作品" /></figure>
          <figure class="gallery-card"><img src="assets/work-04-11.jpg" alt="花朵质感妆造作品" /></figure>
        </div>
      </section>
    </main>
    <script>
      function updateBackgroundFade() {
        const fade = Math.min(window.scrollY / Math.max(window.innerHeight * 0.85, 1), 0.9);
        document.body.style.setProperty("--scroll-dark", fade.toFixed(3));
      }

      updateBackgroundFade();
      window.addEventListener("scroll", updateBackgroundFade, { passive: true });
    </script>
  </body>
</html>
