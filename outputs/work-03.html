<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Identity 03</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        --scroll-dark: 0;
        margin: 0;
        min-height: 100vh;
        color: #f4f4ef;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .background-video {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .background-fade {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 50% 18%, rgba(180, 123, 62, 0.12), transparent 34%),
          rgba(0, 0, 0, var(--scroll-dark));
        pointer-events: none;
      }

      .detail-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        padding: 28px clamp(18px, 5vw, 72px) 72px;
        overflow-x: hidden;
      }

      .detail-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .series-id {
        color: rgba(244, 244, 239, 0.62);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .detail-hero {
        width: min(760px, 100%);
        margin: 18vh auto 7vh;
        text-align: center;
      }

      .detail-kicker {
        margin: 0 0 14px;
        color: rgba(244, 244, 239, 0.64);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .detail-title {
        margin: 0;
        font-size: clamp(3.2rem, 10vw, 8rem);
        font-weight: 900;
        line-height: 0.86;
        text-transform: uppercase;
      }

      .detail-copy {
        width: min(560px, 100%);
        margin: 22px auto 0;
        color: rgba(244, 244, 239, 0.72);
        font-size: clamp(0.9rem, 1.6vw, 1.05rem);
        line-height: 1.7;
      }

      .gallery-wrap {
        width: min(1080px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .gallery-strip {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .gallery-card {
        margin: 0;
        flex: 1 1 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      .gallery-spacer {
        flex: 0 0 42px;
        min-height: 1px;
      }

      .gallery-strip.is-second-row .gallery-card {
        flex: 0 0 calc((100% - 112px) / 7);
      }

      .gallery-card img {
        display: block;
        width: 100%;
        height: auto;
      }

      .gallery-strip.is-second-row .gallery-card.match-fourth img {
        aspect-ratio: 1235 / 1800;
        object-fit: contain;
      }

      @media (max-width: 960px) {
        .detail-hero {
          margin-top: 12vh;
        }

        .gallery-strip {
          overflow-x: auto;
          padding-bottom: 12px;
          scroll-snap-type: x proximity;
        }

        .gallery-card {
          flex: 0 0 150px;
          scroll-snap-align: start;
        }

        .gallery-spacer {
          flex-basis: 42px;
        }

        .gallery-strip.is-second-row .gallery-card {
          flex-basis: 150px;
        }

      }

      @media (max-width: 720px) {
        .detail-hero {
          text-align: left;
        }

        .detail-copy {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <video class="background-video" src="assets/work-03-bg.mp4" muted loop playsinline autoplay preload="metadata"></video>
    <div class="background-fade" aria-hidden="true"></div>

    <main class="detail-page">
      <nav class="detail-nav" aria-label="作品详情导航">
        <a class="back-link" href="index.html#work">返回作品</a>
        <span class="series-id">Series 03</span>
      </nav>

      <section class="detail-hero" aria-labelledby="detail-title">
        <p class="detail-kicker">Brand Identity</p>
        <h1 class="detail-title" id="detail-title">Stage<br />Posters</h1>
        <p class="detail-copy">
          这组图片放在详情页中部的横排区域，每张图都缩小处理，按从左到右一排展示七张。
        </p>
      </section>

      <section class="gallery-wrap" aria-label="03 系列作品图片">
        <div class="gallery-strip">
          <figure class="gallery-card"><img src="assets/work-03-01.jpg" alt="离岸三公里的风海报" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-02.jpg" alt="作品海报 02" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-03.jpg" alt="作品海报 03" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-04.jpg" alt="作品海报 04" /></figure>
          <div class="gallery-spacer" aria-hidden="true"></div>
          <figure class="gallery-card"><img src="assets/work-03-05.jpg" alt="作品海报 05" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-06.jpg" alt="作品海报 06" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-07.jpg" alt="作品海报 07" /></figure>
        </div>
        <div class="gallery-strip is-second-row">
          <figure class="gallery-card"><img src="assets/work-03-11.jpg" alt="Colorday 直播海报" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-08.jpg" alt="作品海报 08" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-09.jpg" alt="作品海报 09" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-10.jpg" alt="作品海报 10" /></figure>
          <figure class="gallery-card match-fourth"><img src="assets/work-03-12.png" alt="二月杏花花神海报" /></figure>
          <figure class="gallery-card match-fourth"><img src="assets/work-03-13.png" alt="六月荷花花神海报" /></figure>
          <figure class="gallery-card"><img src="assets/work-03-14.png" alt="八月桂花花神海报" /></figure>
        </div>
      </section>
    </main>
    <script>
      function updateBackgroundFade() {
        const fade = Math.min(window.scrollY / Math.max(window.innerHeight * 0.85, 1), 0.9);
        document.body.style.setProperty("--scroll-dark", fade.toFixed(3));
      }

      updateBackgroundFade();
      window.addEventListener("scroll", updateBackgroundFade, { passive: true });
    </script>
  </body>
</html>
